<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Loading POS System...</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #573CFA 0%, #3D26D6 100%);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .splash-container {
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }
    
    .logo {
      width: 120px;
      height: 120px;
      background: white;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .logo span {
      font-size: 64px;
    }
    
    .app-name {
      color: white;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    
    .tagline {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      margin-bottom: 32px;
    }
    
    .loader {
      width: 40px;
      height: 40px;
      margin: 0 auto;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin: 24px auto 0;
      overflow: hidden;
    }
    
    .progress-fill {
      width: 0%;
      height: 100%;
      background: white;
      border-radius: 2px;
      animation: progress 2s ease-out forwards;
    }
    
    .loading-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      margin-top: 16px;
    }
    
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    
    @keyframes progress {
      0% {
        width: 0%;
      }
      50% {
        width: 60%;
      }
      100% {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo">
      <span>🍽️</span>
    </div>
    <div class="app-name">POS System</div>
    <div class="tagline">Complete Point of Sale Solution</div>
    <div class="loader"></div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="loading-text">Loading your POS experience...</div>
  </div>
  
  <script>
    // Simulate loading progress
    let progress = 0;
    const fillElement = document.querySelector('.progress-fill');
    const textElement = document.querySelector('.loading-text');
    const messages = [
      'Loading your POS experience...',
      'Preparing menu...',
      'Connecting to kitchen...',
      'Almost ready...'
    ];
    
    const interval = setInterval(() => {
      progress += Math.random() * 15;
      if (progress >= 100) {
        progress = 100;
        clearInterval(interval);
      }
      if (fillElement) {
        fillElement.style.width = progress + '%';
      }
      
      // Change loading message
      const messageIndex = Math.floor(progress / 25);
      if (messageIndex < messages.length && textElement) {
        textElement.textContent = messages[messageIndex];
      }
    }, 300);
    
    // Redirect to main app after splash
    setTimeout(() => {
      window.location.href = '/';
    }, 2500);
  </script>
</body>
</html>
