version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: pos-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: pos-system
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    container_name: pos-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password@mongodb:27017/pos-system?authSource=admin
      JWT_SECRET: your-super-secret-jwt-key
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules

  client:
    build: ./client
    container_name: pos-client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongodb_data: