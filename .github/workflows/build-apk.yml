name: Build POS APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Dependencies
      working-directory: ./client
      run: |
        npm install
        npm install -D typescript@4.9.5
    
    - name: Build React App
      working-directory: ./client
      run: |
        export NODE_OPTIONS=--openssl-legacy-provider
        npm run build
    
    - name: Verify build exists
      working-directory: ./client
      run: |
        ls -la build/
        test -f build/index.html || (echo "Build failed: index.html not found" && exit 1)
    
    - name: Setup Capacitor
      working-directory: ./client
      run: |
        if [ ! -f capacitor.config.json ]; then
          echo '{
            "appId": "com.pos.app",
            "appName": "POS System",
            "webDir": "build",
            "bundledWebRuntime": false
          }' > capacitor.config.json
        fi
        npx cap sync android
        npx cap copy android
    
    - name: Fix Android files
      working-directory: ./client/android
      run: |
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/xml
        
        if [ ! -f app/src/main/res/values/strings.xml ]; then
          cat > app/src/main/res/values/strings.xml << 'XMLEND'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">POS System</string>
</resources>
XMLEND
        fi
        
        if [ ! -f app/src/main/res/values/colors.xml ]; then
          cat > app/src/main/res/values/colors.xml << 'XMLEND'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="purple_500">#573CFA</color>
    <color name="purple_700">#3D26D6</color>
</resources>
XMLEND
        fi
    
    - name: Build APK
      working-directory: ./client/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: POS-APK
        path: client/android/app/build/outputs/apk/debug/app-debug.apk
